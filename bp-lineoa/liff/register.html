<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ลงทะเบียน — ระบบติดตามความดัน</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #F0F4F8; }
    .header { background: #1A3A6B; color: white; padding: 18px 16px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; opacity: .75; margin-top: 2px; }
    .form-container { padding: 16px; max-width: 480px; margin: 0 auto; }
    .card { background: white; border-radius: 14px; padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .card h2 { font-size: 15px; font-weight: 600; color: #1A3A6B; margin-bottom: 14px; border-bottom: 2px solid #E8EEF8; padding-bottom: 8px; }
    .form-group { margin-bottom: 14px; }
    label.field-label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
    .req { color: #E74C3C; }
    input[type=text], input[type=tel], input[type=number] {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #DDE3EF; border-radius: 8px;
      font-size: 14px; font-family: inherit; color: #2C3E50; background: white;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* Radio group */
    .group-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
    .group-radio { display: none; }
    .group-label {
      border: 2px solid #DDE3EF; border-radius: 10px; padding: 16px 8px;
      text-align: center; background: white; display: block; cursor: pointer;
    }
    .group-radio:checked + .group-label { border-color: #2D6BCD; background: #EAF2FF; }
    .group-label .gi { font-size: 26px; display: block; margin-bottom: 4px; }
    .group-label .gn { font-size: 13px; font-weight: 600; color: #2C3E50; display: block; }
    .group-label .gd { font-size: 10px; color: #888; margin-top: 3px; display: block; }

    .btn-submit {
      width: 100%; padding: 14px; background: #2D6BCD; color: white;
      border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .btn-submit:disabled { background: #B0BEC5; }
    .err { color: #E74C3C; font-size: 12px; margin-top: 4px; display: none; }
    .err.show { display: block; }
    .success-msg { display: none; text-align: center; padding: 30px; background: white; border-radius: 14px; margin: 20px 16px; }
    .success-msg .si { font-size: 48px; }
    .success-msg h2 { color: #27AE60; font-size: 20px; margin-top: 10px; }
    .success-msg p { color: #666; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>

<div class="header">
  <h1>ลงทะเบียน</h1>
  <p>ระบบติดตามความดันโลหิต รพ.สต.หนองบ่อ</p>
</div>

<div id="form-section">
<div class="form-container">

  <div class="card">
    <h2>👥 ประเภทการลงทะเบียน <span class="req">*</span></h2>
    <div class="group-selector">
      <div>
        <input type="radio" name="group_type" id="rb-risk" value="risk" class="group-radio">
        <label for="rb-risk" class="group-label">
          <span class="gi">⚠️</span>
          <span class="gn">กลุ่มเสี่ยง</span>
        </label>
      </div>
      <div>
        <input type="radio" name="group_type" id="rb-patient" value="patient" class="group-radio">
        <label for="rb-patient" class="group-label">
          <span class="gi">🏥</span>
          <span class="gn">กลุ่มป่วย</span>
        </label>
      </div>
    </div>
    <div class="err" id="group-error">กรุณาเลือกประเภทการลงทะเบียน</div>
  </div>

  <div class="card">
    <h2>ข้อมูลส่วนตัว</h2>
    <div class="row">
      <div class="form-group">
        <label class="field-label">ชื่อ <span class="req">*</span></label>
        <input type="text" id="first_name" placeholder="ชื่อ">
      </div>
      <div class="form-group">
        <label class="field-label">นามสกุล <span class="req">*</span></label>
        <input type="text" id="last_name" placeholder="นามสกุล">
      </div>
    </div>
    <div class="form-group">
      <label class="field-label">เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" placeholder="08x-xxx-xxxx">
    </div>
    <div class="form-group">
      <label class="field-label">อายุ</label>
      <input type="number" id="age" placeholder="อายุ (ปี)" min="0" max="120">
    </div>
  </div>

  <div class="card">
    <h2>ที่อยู่</h2>
    <div class="form-group">
      <label class="field-label">หมู่ที่</label>
      <input type="number" id="moo" placeholder="หมู่" min="1" max="20">
    </div>
    <div class="form-group">
      <label class="field-label">ตำบล</label>
      <input type="text" id="tambon" placeholder="ตำบล">
    </div>
    <div class="form-group">
      <label class="field-label">อำเภอ</label>
      <input type="text" id="amphoe" placeholder="อำเภอ">
    </div>
    <div class="form-group">
      <label class="field-label">จังหวัด</label>
      <input type="text" id="changwat" placeholder="จังหวัด">
    </div>
  </div>

  <button type="button" class="btn-submit" id="submit-btn">✅ บันทึกข้อมูล</button>
  <p style="text-align:center;font-size:12px;color:#E74C3C;margin-top:8px;" id="status-msg"></p>

</div>
</div>

<div class="success-msg" id="success-msg">
  <div class="si">🎉</div>
  <h2>ลงทะเบียนสำเร็จ!</h2>
  <p>ข้อมูลของคุณถูกบันทึกเรียบร้อยแล้ว<br>สามารถส่งค่าความดันได้ทันทีผ่านแชท LINE</p>
  <br>
  <button type="button" class="btn-submit" id="close-btn" style="max-width:200px;margin:0 auto;display:block;">ปิดหน้าต่าง</button>
</div>

<script>
var API_BASE = 'https://bp-monitor-axo6.onrender.com/api';
var LIFF_ID = '2009672584-hA6Itz4o';
var lineUserId = '';

<button type="button" class="btn-submit" id="submit-btn" onclick="submitForm()">✅ บันทึกข้อมูล</button>
document.getElementById('close-btn').addEventListener('click', function() {
  try { liff.closeWindow(); } catch(e) { window.close(); }
});

function getSelectedGroup() {
  var radios = document.getElementsByName('group_type');
  for (var i = 0; i < radios.length; i++) {
    if (radios[i].checked) return radios[i].value;
  }
  return '';
}

async function submitForm() {
  var group = getSelectedGroup();
  if (!group) {
    document.getElementById('group-error').classList.add('show');
    return;
  }
  document.getElementById('group-error').classList.remove('show');

  var first_name = document.getElementById('first_name').value.trim();
  var last_name = document.getElementById('last_name').value.trim();
  if (!first_name || !last_name) {
    alert('กรุณากรอกชื่อและนามสกุล');
    return;
  }

  var btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'กำลังบันทึก...';

  var data = {
    line_user_id: lineUserId || ('guest-' + Date.now()),
    group_type: group,
    first_name: first_name,
    last_name: last_name,
    phone: document.getElementById('phone').value.trim(),
    moo: document.getElementById('moo').value,
    tambon: document.getElementById('tambon').value.trim(),
    amphoe: document.getElementById('amphoe').value.trim(),
    changwat: document.getElementById('changwat').value.trim(),
  };

  try {
    var res = await fetch(API_BASE + '/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    var json = await res.json();
    if (!json.success) throw new Error(json.error || 'บันทึกไม่สำเร็จ');

    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-msg').style.display = 'block';

    try {
      if (liff.isInClient()) {
        liff.sendMessages([{ type: 'text', text: 'ลงทะเบียนเสร็จแล้ว! ชื่อ: ' + first_name + ' ' + last_name }]);
      }
    } catch(e) {}

  } catch(err) {
   } catch(err) {
    document.getElementById('status-msg').textContent = 'Error: ' + err.message + ' | group: ' + group + ' | user: ' + lineUserId;
    btn.disabled = false;
    btn.textContent = '✅ บันทึกข้อมูล';
  }
}

async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (liff.isLoggedIn()) {
      var profile = await liff.getProfile();
      lineUserId = profile.userId;
    } else {
      liff.login();
    }
  } catch(err) {
    lineUserId = 'dev-' + Date.now();
  }
}

init();
</script>
</body>
</html>
